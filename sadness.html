<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Emeowtions</title>


      <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">


    <link rel="icon" type="image/png" href="images/MoodImages/cat/sadCat.png">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
      <link href="styles/global.css" rel="stylesheet">
      <link href="styles/sadness.css" rel="stylesheet">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
      rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script type="module" src="../images/Memes/imageManager.js"></script>
  </head>
  <body class="test">
    <div class="title jumbotron jumbotron-fluid text-center">
      <div class="container">
        <h1 class="display-4">We're sorry you feel sad today...</h1>
        <p class="fw-bold fs-3">Here is a <span id="animal-type"></span> meme to cheer you up!</p>
        <script src="./scripts/getAnimalTy.js" defer></script>
      </div>
    </div>
    <div class="container">
      <picture>
        <p class="text-center">
          <img id="meme-image" src="" class="img-fluid meme" alt="Sad Meme about how our image didn't load">
        </p>
      </picture>
      
      <script type="module" src="./scripts/randMeme.js"></script>
    </div>
    <div class="container mt-1 text-center">
      <blockquote class="blockquote text-center">
        <p class="mb-0 quoteFoot"><span id="quote-full"></span></p>
        <footer class="blockquote-footer"><span id="quote-author"></span></footer>
      </blockquote>
      <script type= "module" src="./scripts/randQuote.js"></script>
    </div>
    <script src="./scripts/global.js"></script>
    <div class="d-flex justify-content-center gap-3">
      <button id="changeMoodBtn" class="btn btn-primary">Reselect Mood</button>
      <button id="chartBtn" class="btn btn-success">See Your Mood Chart</button>
    </div>
  </body>
</html>
