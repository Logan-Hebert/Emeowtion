<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <!-- ICONS-->
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.8/css/line.css">
    <!-- Carousel CSS -->
    <link rel="stylesheet" href="styles/cIndex.css">
    <link rel="stylesheet" href="styles/global.css">


    <!-- Background Image -->
    <style>
        body {
            height: 100vh;
        }
        
    </style>
</head>

<body>
    <section>
        <menu id="menu">
            <li id="cat" style="background: url('./IMAGE-FOLDER/first-book-of-the-gospel.png') center center/cover;">
                <div class="details">
                    <p>Cat</p>
                  
                </div>
            </li>
            <li id="dog" style="background: url('./IMAGE-FOLDER/just-got-babygirled.png') center center/cover;">
                <div class="details">
                    <p>Dog</p>
                    
                </div>
            </li>
            <li id="horse" style="background: url('./IMAGE-FOLDER/logan-an-password.png') center center/cover;">
                <div class="details">
                    <p>Horse</p>
         
                </div>
            </li>
            <li
                id="fish" style="background: url('./IMAGE-FOLDER/yo-kid-from-across-the-table-let-me-hold-five-dollars.png') center center/cover;">
                <div class="details">
                    <p>Fish</p>

             
                </div>
            </li>
            <li id="panda"style="background: url('./IMAGE-FOLDER/chat-we-cooked.png') center center/cover;">
                <div class="details">
                    <p>Panda</p>

                 
                </div>
            </li>

        </menu>

        <div class="controls">
            <button class="prev"><i class="uil uil-angle-left-b"></i></button>
            <button class="next"><i class="uil uil-angle-right-b"></i></button>
        </div>

    </section>

    <script src="scripts/global.js"></script>
    <script src="scripts/cIndex.js"></script>
</body>

</html>

<article>
    <header>
        <h1>Welcome To</h1>
        <h2>eMeowtions!</h2>
        <p>What's your favorite pet?</p>
    </header>
</article>
