<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emowtional Chart</title>
    <link rel="icon" type="image/png" href="images/MoodImages/cat/sadcat.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link href="styles/global.css" rel="stylesheet">
    <link href="styles/chart.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <script src="scripts/global.js" defer></script>
    <script src="scripts/chart.js" defer></script>
</head>
<style>
    #chartText {
        color: white;
    }
</style>

<body class="vh-100 d-flex justify-center items-center" style="height: 100vh; flex-direction: column;">
<div class="flex container mt-5 w-100" style="flex: 2;">
    <div class="card mt-5 p-2 shadow w-100">
        <div class="card-body">
            <h5 class="card-title">Moods this Month</h5>
            <canvas id="myChart"></canvas>
        </div>
    </div>
</div>

<div class="flex text-center mt-0 mx-5" style="font-size: 3rem; flex: 1; display: flex; align-items: center; justify-content: center;">
    <p id="chartText" style="margin: 50px 200px 100px; flex: 1;">You've been pretty happy this month! Whatever you're doing, keep it up!</p>
</div>
<button id="home" class="btn btn-primary text-center" style="font-size: 3rem;"> Home </button>

</body>
</html>
